AWSTemplateFormatVersion: 2010-09-09
Description: Application Load Balancer for CloudShirt ASG instances

Parameters:
  CertificateArn:
    Type: String
    Description: ARN of the ACM certificate for HTTPS listeners
  LogBucketName:
    Type: String
    Description: Name of the S3 bucket for ALB access logs

Resources:
  ## =========================
  ## Application Load Balancer
  ## =========================
  CloudShirtALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: CloudShirtALB
      Subnets:
        - !ImportValue base-stack:CloudShirtFirstSubnet
        - !ImportValue base-stack:CloudShirtSecondSubnet
      SecurityGroups:
        - !ImportValue base-stack:InstanceSG
      Scheme: internet-facing
      Type: application
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
        - Key: access_logs.s3.enabled
          Value: "true"
        - Key: access_logs.s3.bucket
          Value: !Ref LogBucketName

  ## =========================
  ## Target Group voor poort 5106
  ## =========================
  CloudShirtTG5106:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: CloudShirtTG5106
      Port: 5106
      Protocol: HTTP
      VpcId: !ImportValue base-stack:VPC
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 2

  ## =========================
  ## Target Group voor poort 5098
  ## =========================
  CloudShirtTG5098:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: CloudShirtTG5098
      Port: 5098
      Protocol: HTTP
      VpcId: !ImportValue base-stack:VPC
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 2

  ## =========================
  ## HTTP listener: redirect to HTTPS
  ## =========================
  CloudShirtHTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref CloudShirtALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  ## =========================
  ## HTTPS Listener voor poort 5106
  ## =========================
  CloudShirtListener5106:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref CloudShirtALB
      Port: 5106
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref CloudShirtTG5106

  ## =========================
  ## HTTPS Listener voor poort 5098
  ## =========================
  CloudShirtListener5098:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref CloudShirtALB
      Port: 5098
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref CloudShirtTG5098

Outputs:
  LoadBalancerDNS:
    Description: DNS name of the ALB
    Value: !GetAtt CloudShirtALB.DNSName
    Export:
      Name: CloudShirtALB-DNS

  TargetGroup5106ARN:
    Description: ARN of the Target Group for port 5106
    Value: !Ref CloudShirtTG5106
    Export:
      Name: CloudShirtTG5106-ARN

  TargetGroup5098ARN:
    Description: ARN of the Target Group for port 5098
    Value: !Ref CloudShirtTG5098
    Export:
      Name: CloudShirtTG5098-ARN
