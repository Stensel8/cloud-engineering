AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudShirt Docker Swarm - ECR-stack (REQ-12).
  Elastic Container Registry voor Docker-images die de Buildserver
  nachtelijks bouwt en pusht: een repo voor de web-frontend en een voor de Go API.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  ECRRepoName:
    Type: String
    Default: cloudshirt
    Description: Naam van de ECR-repository voor de web-frontend

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── ECR-repository voor de web-frontend (REQ-12) ─────────────────────────
  ECRRepository:
    Type: AWS::ECR::Repository
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_136
            comment: "KMS-encryptie niet beschikbaar in AWS Academy student lab"
    Properties:
      RepositoryName: !Ref ECRRepoName
      # MUTABLE zodat de nightly build de :latest tag kan overschrijven.
      # Datumtags (bijv. :20240101) zijn uniek per build en worden nooit hergebruikt.
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      # Bewaar maximaal 10 images om kosten te beperken
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: CloudShirt-ECR-Web

  # ── ECR-repository voor de Go API (REQ-12) ───────────────────────────────
  ECRRepositoryApi:
    Type: AWS::ECR::Repository
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_136
            comment: "KMS-encryptie niet beschikbaar in AWS Academy student lab"
    Properties:
      RepositoryName: !Sub "${ECRRepoName}-api"
      # MUTABLE om dezelfde reden als de web-repo hierboven
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      # Bewaar maximaal 10 images om kosten te beperken
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: CloudShirt-ECR-Api

# ---------------------------------------------------------------------------
# Outputs — geexporteerd voor gebruik door andere stacks
# ---------------------------------------------------------------------------
Outputs:

  ECRRepoName:
    Description: Naam van de ECR-repository (web-frontend)
    Value: !Ref ECRRepoName
    Export:
      Name: !Sub "${AWS::StackName}:ECRRepoName"

  ECRRepositoryURI:
    Description: Volledige URI van de web ECR-repository
    # !GetAtt geeft de officiële AWS-URI terug; handmatig construeren met AccountId/Region
    # zou breken als het URI-formaat ooit wijzigt.
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}:ECRRepositoryURI"

  ECRApiRepositoryURI:
    Description: Volledige URI van de API ECR-repository
    Value: !GetAtt ECRRepositoryApi.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}:ECRApiRepositoryURI"
