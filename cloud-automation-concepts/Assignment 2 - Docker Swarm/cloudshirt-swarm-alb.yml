AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudShirt Docker Swarm - ALB-stack (ondersteunt REQ-14).
  Application Load Balancer, target group en HTTP-listener voor
  inkomend verkeer naar de Swarm worker nodes.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  NetworkStackName:
    Type: String
    Default: cloudshirt-swarm-network
    Description: >
      Naam van de netwerk-stack waaruit VPC-id, subnetten en security groups
      worden geïmporteerd. Pas aan als de netwerk-stack een andere naam heeft.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_91
            comment: "ALB access logging naar S3 vereist bucket policy via IAM, niet beschikbaar in student lab"
    Properties:
      Name: CloudShirt-ALB
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - Fn::ImportValue: !Sub "${NetworkStackName}:ALBSecurityGroup"
      Subnets:
        - Fn::ImportValue: !Sub "${NetworkStackName}:PublicSubnetA"
        - Fn::ImportValue: !Sub "${NetworkStackName}:PublicSubnetB"
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
      Tags:
        - Key: Name
          Value: CloudShirt-ALB

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: CloudShirt-TG
      Port: 80
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub "${NetworkStackName}:VPCID"
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetType: instance
      Tags:
        - Key: Name
          Value: CloudShirt-TG

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_2
            comment: "HTTP-only lab/demo omgeving, geen certificaat beschikbaar"
          - id: CKV_AWS_103
            comment: "HTTP-only lab/demo omgeving, geen certificaat beschikbaar"
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

# ---------------------------------------------------------------------------
# Outputs — geexporteerd voor gebruik door andere stacks
# ---------------------------------------------------------------------------
Outputs:

  ALBDNSName:
    Description: Publieke DNS van de Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}:ALBDNSName"

  TargetGroupArn:
    Description: ARN van de ALB target group
    Value: !Ref ALBTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}:TargetGroupArn"
