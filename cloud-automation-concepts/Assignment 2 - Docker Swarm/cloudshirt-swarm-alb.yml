AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudShirt Docker Swarm - ALB-stack.
  Application Load Balancer, target group en HTTP-listener.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: CloudShirt-ALB
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !ImportValue cloudshirt-swarm-network:ALBSecurityGroup
      Subnets:
        - !ImportValue cloudshirt-swarm-network:PublicSubnetA
        - !ImportValue cloudshirt-swarm-network:PublicSubnetB
      Tags:
        - Key: Name
          Value: CloudShirt-ALB

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: CloudShirt-TG
      Port: 80
      Protocol: HTTP
      VpcId: !ImportValue cloudshirt-swarm-network:VPCID
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetType: instance
      Tags:
        - Key: Name
          Value: CloudShirt-TG

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

# ---------------------------------------------------------------------------
# Outputs — geexporteerd voor gebruik door andere stacks
# ---------------------------------------------------------------------------
Outputs:

  ALBDNSName:
    Description: Publieke DNS van de Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}:ALBDNSName"

  TargetGroupArn:
    Description: ARN van de ALB target group
    Value: !Ref ALBTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}:TargetGroupArn"
