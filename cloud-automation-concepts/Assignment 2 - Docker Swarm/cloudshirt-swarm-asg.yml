AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudShirt Docker Swarm - ASG Workers (REQ-14).
  Auto Scaling Group met worker nodes die automatisch de Docker Swarm joinen
  via het join-token en manager-IP uit SSM Parameter Store.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  NetworkStackName:
    Type: String
    Default: cloudshirt-swarm-network
    Description: >
      Naam van de netwerk-stack waaruit subnetten en security group worden geïmporteerd.
      Pas aan als de netwerk-stack een andere naam heeft.

  AlbStackName:
    Type: String
    Default: cloudshirt-swarm-alb
    Description: >
      Naam van de ALB-stack waaruit de target group ARN wordt geïmporteerd.
      Pas aan als de ALB-stack een andere naam heeft.

  SsmPrefix:
    Type: String
    Default: /cloudshirt/swarm
    Description: >
      Prefix voor SSM Parameter Store sleutels. Moet overeenkomen met de waarde
      in de Buildserver-stack zodat workers het token en IP kunnen vinden.
      Voorbeeld: /cloudshirt/swarm → /cloudshirt/swarm/worker-token

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.small, t3.medium, t3.large]
    # t3.medium (4 GB) als standaard: geeft voldoende ruimte voor Docker containers
    # naast het Swarm verkeer en ECR image pulls.
    Description: EC2 instance type voor worker nodes

  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0190ba1cb5ab4e9e8
    # Dezelfde AMI als de Buildserver; apart parameter zodat workers en manager
    # onafhankelijk naar een andere AMI kunnen worden bijgewerkt.
    Description: Amazon Linux 2023 AMI (64-bit x86)

  MinInstances:
    Type: Number
    Default: 2
    Description: Minimum aantal worker instances

  MaxInstances:
    Type: Number
    Default: 4
    Description: Maximum aantal worker instances

  DesiredInstances:
    Type: Number
    Default: 2
    Description: Gewenst aantal worker instances

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Launch Template voor Swarm Workers (REQ-14) ──────────────────────────
  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: CloudShirt-Worker-LT
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        ImageId: !Ref AmiId
        IamInstanceProfile:
          Name: LabInstanceProfile
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 1
        SecurityGroupIds:
          - Fn::ImportValue: !Sub "${NetworkStackName}:WorkerSecurityGroup"
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: CloudShirt-Worker
              - Key: Role
                Value: SwarmWorker
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e
            exec > /var/log/userdata.log 2>&1

            # Pakketten installeren
            yum update -y
            yum install -y docker aws-cli jq

            # Docker starten en inschakelen
            systemctl enable docker
            systemctl start docker
            usermod -aG docker ec2-user

            # Docker Compose v2 installeren
            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -SL https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64 \
              -o /usr/local/lib/docker/cli-plugins/docker-compose
            chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

            # Inloggen bij ECR
            aws ecr get-login-password --region ${AWS::Region} | \
              docker login --username AWS --password-stdin \
              ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com

            # ── Wacht op SSM-parameters van de Buildserver (REQ-14) ───────────────
            # De Buildserver schrijft het token en IP pas na swarm init, wat meerdere
            # minuten duurt. sleep 15 is onvoldoende; retry-lus wacht tot 10 minuten.
            SSM_PREFIX="${SsmPrefix}"
            MAX_WAIT=600
            INTERVAL=15
            ELAPSED=0
            MANAGER_IP=""
            WORKER_TOKEN=""

            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              MANAGER_IP=$(aws ssm get-parameter \
                --name "$SSM_PREFIX/manager-ip" \
                --query "Parameter.Value" --output text --region ${AWS::Region} 2>/dev/null || true)

              WORKER_TOKEN=$(aws ssm get-parameter \
                --name "$SSM_PREFIX/worker-token" \
                --with-decryption \
                --query "Parameter.Value" --output text --region ${AWS::Region} 2>/dev/null || true)

              if [ -n "$MANAGER_IP" ] && [ -n "$WORKER_TOKEN" ]; then
                echo "[UserData] SSM-parameters beschikbaar: manager=$MANAGER_IP"
                break
              fi

              echo "[UserData] SSM-parameters nog niet beschikbaar; wacht $INTERVAL s ($ELAPSED s verstreken)..."
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ -z "$MANAGER_IP" ] || [ -z "$WORKER_TOKEN" ]; then
              echo "[UserData] FOUT: SSM-parameters niet beschikbaar binnen $MAX_WAIT s. Buildserver mogelijk niet klaar."
              exit 1
            fi

            # Joinen bij de Swarm als worker node (REQ-14)
            docker swarm join --token "$WORKER_TOKEN" "$MANAGER_IP:2377"
            echo "[UserData] Worker gejoined aan Swarm op $MANAGER_IP"

  # ── Auto Scaling Group (REQ-14: ASG-instances als Swarm Workers) ─────────
  WorkerAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: CloudShirt-Worker-ASG
      # Minimaal 2 instances (1 per AZ) voor spreiding over availability zones
      MinSize: !Ref MinInstances
      MaxSize: !Ref MaxInstances
      DesiredCapacity: !Ref DesiredInstances
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub "${NetworkStackName}:PrivateSubnetA"
        - Fn::ImportValue: !Sub "${NetworkStackName}:PrivateSubnetB"
      TargetGroupARNs:
        - Fn::ImportValue: !Sub "${AlbStackName}:TargetGroupArn"
      HealthCheckType: ELB
      # Grace period gelijk aan de SSM-wacht timeout (600s) zodat de ASG een instance
      # niet verwijdert voordat de worker de Swarm heeft gejoint en verkeer kan ontvangen.
      HealthCheckGracePeriod: 600
      Tags:
        - Key: Name
          Value: CloudShirt-Worker
          PropagateAtLaunch: true
        - Key: Role
          Value: SwarmWorker
          PropagateAtLaunch: true

  # ── CPU-gebaseerde schaalactie voor piekbelasting ─────────────────────────
  CPUScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70.0
