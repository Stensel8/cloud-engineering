AWSTemplateFormatVersion: 2010-09-09
Description: >
  CloudShirt serverless stack (REQ-08).
  Een Lambda-functie controleert dagelijks om 03:00 UTC of de order-export
  (REQ-07) succesvol naar S3 is geschreven en stuurt een SNS-melding.
  Getriggerd door EventBridge (cron). Volledig serverless: geen servers,
  geen beheer, automatisch schaalbaar.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  BucketName:
    Type: String
    Description: Naam van de S3-bucket voor RDS-exports (zelfde als cloudshirt-s3)

  LambdaRoleArn:
    Type: String
    Description: ARN van een bestaande IAM-role voor Lambda (bijv. AWS Academy LabRole)

  LambdaReservedConcurrency:
    Type: Number
    Default: 5
    Description: Maximaal aantal gelijktijdige Lambda-uitvoeringen

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # -------------------------------------------------------------------------
  # SNS Topic — ontvangt export-statusmeldingen van de Lambda
  # -------------------------------------------------------------------------
  ExportNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      KmsMasterKeyId: alias/aws/sns

  # -------------------------------------------------------------------------
  # DLQ — ontvangt mislukte asynchrone Lambda-events
  # -------------------------------------------------------------------------
  ExportMonitorDLQ:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs

  # -------------------------------------------------------------------------
  # Lambda SG — alleen egress, geen inkomende poorten nodig
  # -------------------------------------------------------------------------
  ExportMonitorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group voor CloudShirt export monitor Lambda
      VpcId: !ImportValue cloudshirt-network:VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow outbound traffic for Lambda to reach AWS services

  # -------------------------------------------------------------------------
  # Lambda Function — controleert of orders.csv vandaag bijgewerkt is
  # -------------------------------------------------------------------------
  ExportMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: >
        Controleert dagelijks of de CloudShirt order-export naar S3 is geslaagd
        en stuurt een SNS-melding met de status.
      Runtime: python3.12
      Handler: index.handler
      Role: !Ref LambdaRoleArn
      Timeout: 30
      KmsKeyArn: alias/aws/lambda
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency
      DeadLetterConfig:
        TargetArn: !GetAtt ExportMonitorDLQ.Arn
      VpcConfig:
        SubnetIds:
          - !ImportValue cloudshirt-network:CloudShirtFirstPrivateSubnet
          - !ImportValue cloudshirt-network:CloudShirtSecondPrivateSubnet
        SecurityGroupIds:
          - !Ref ExportMonitorSecurityGroup
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          SNS_TOPIC_ARN: !Ref ExportNotificationTopic
          EXPORT_KEY: exports/orders.csv
      Code:
        ZipFile: |
          import boto3
          import os
          from datetime import datetime, timezone

          s3  = boto3.client('s3')
          sns = boto3.client('sns')

          def handler(event, context):
              bucket    = os.environ['BUCKET_NAME']
              key       = os.environ['EXPORT_KEY']
              topic_arn = os.environ['SNS_TOPIC_ARN']
              today     = datetime.now(timezone.utc).date()

              try:
                  resp          = s3.head_object(Bucket=bucket, Key=key)
                  last_modified = resp['LastModified'].date()
                  size_kb       = resp['ContentLength'] // 1024

                  if last_modified >= today:
                      subject = 'CloudShirt export: GESLAAGD'
                      message = (
                          f'De dagelijkse order-export is succesvol uitgevoerd.\n\n'
                          f'Datum:            {today}\n'
                          f'Bestand:          s3://{bucket}/{key}\n'
                          f'Laatst gewijzigd: {resp["LastModified"]}\n'
                          f'Bestandsgrootte:  {size_kb} KB\n'
                      )
                  else:
                      subject = 'CloudShirt export: GEMIST'
                      message = (
                          f'De order-export is vandaag NIET bijgewerkt.\n\n'
                          f'Datum vandaag:   {today}\n'
                          f'Laatste update:  {last_modified}\n\n'
                          f'Controleer de cron-job op de EC2-instances '
                          f'(/etc/cron.d/cloudshirt-export) en het logbestand '
                          f'/var/log/export-orders.log.'
                      )

              except s3.exceptions.ClientError as e:
                  error_code = e.response['Error']['Code']
                  subject    = 'CloudShirt export: FOUT'
                  message    = (
                      f'Exportbestand niet gevonden of niet toegankelijk.\n\n'
                      f'Bucket:     {bucket}\n'
                      f'Key:        {key}\n'
                      f'Foutcode:   {error_code}\n'
                      f'Detail:     {e}\n\n'
                      f'Controleer of de S3-bucket bestaat en de cron-job actief is.'
                  )

              sns.publish(TopicArn=topic_arn, Subject=subject, Message=message)
              print(f'[{subject}] {message}')
              return {'statusCode': 200, 'body': subject}

  # -------------------------------------------------------------------------
  # EventBridge Rule — dagelijkse trigger om 03:00 UTC
  # -------------------------------------------------------------------------
  ExportMonitorSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: >
        Triggert de Lambda dagelijks om 03:00 UTC om de export-status te controleren.
      ScheduleExpression: cron(0 3 * * ? *)
      State: ENABLED
      Targets:
        - Id: ExportMonitorLambdaTarget
          Arn: !GetAtt ExportMonitorFunction.Arn

  # -------------------------------------------------------------------------
  # Lambda Permission — staat EventBridge toe de Lambda aan te roepen
  # -------------------------------------------------------------------------
  ExportMonitorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExportMonitorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ExportMonitorSchedule.Arn

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  LambdaFunctionName:
    Description: Naam van de Lambda-functie
    Value: !Ref ExportMonitorFunction
    Export:
      Name: !Sub "${AWS::StackName}:LambdaFunction"

  LambdaFunctionArn:
    Description: ARN van de Lambda-functie
    Value: !GetAtt ExportMonitorFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}:LambdaArn"

  SNSTopicArn:
    Description: ARN van het SNS-topic voor export-meldingen
    Value: !Ref ExportNotificationTopic
    Export:
      Name: !Sub "${AWS::StackName}:SNSTopic"

  DeadLetterQueueArn:
    Description: ARN van de DLQ voor mislukte Lambda-events
    Value: !GetAtt ExportMonitorDLQ.Arn
    Export:
      Name: !Sub "${AWS::StackName}:DLQArn"
