AWSTemplateFormatVersion: 2010-09-09
Description: >
  CloudShirt Auto Scaling Group (REQ-02).
  Schaalt de webservers automatisch op tijdens piekuren (18:00-20:00 ET)
  en schaalt daarna weer terug naar de basisgrootte.
  Gebruikt dezelfde LaunchTemplate als cloudshirt-ec2.yml.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  # AWS-credentials worden doorgegeven vanuit het deployment-script.
  # Ze worden in de UserData gebruikt om de AWS CLI aan te roepen op de instance.
  AccessKey:
    Type: String
    NoEcho: true
  SecretKey:
    Type: String
    NoEcho: true
  SessionToken:
    Type: String
    NoEcho: true
  AccountId:
    Type: String

  InstanceType:
    Type: String
    Default: t3.small
    Description: EC2 instance type (t3.small aanbevolen voor .NET 10)

  BucketName:
    Type: String
    Description: Naam van de S3-bucket voor RDS-exports

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Naam van een bestaand EC2 KeyPair voor SSH-toegang
    Default: vockey

  RepoUrl:
    Type: String
    Default: https://github.com/stensel8/CloudShirt.git
    Description: Git-repository URL van de CloudShirt-applicatie

  RepoBranch:
    Type: String
    Default: main
    Description: Branch om te klonen

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # -------------------------------------------------------------------------
  # LaunchTemplate — gedeelde opstartconfiguratie voor ASG-instances
  #
  # Elke instance die de ASG start, gebruikt deze template.
  # De UserData installeert .NET, nginx, CloudShirt, Filebeat en mssql-tools.
  # -------------------------------------------------------------------------
  CloudShirtLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: CloudShirtLaunchTemplate
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        ImageId: ami-0cb5cf49019e79c51   # Amazon Linux 2023 (us-east-1, x86_64)
        SecurityGroupIds:
          - !ImportValue cloudshirt-network:InstanceSG
        MetadataOptions:
          HttpTokens: required        # IMDSv2 verplicht (veiliger)
          HttpEndpoint: enabled
        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash -xe
              # ── AWS-omgevingsvariabelen instellen ─────────────────────────
              # Vereist voor AWS CLI-commando's op de instance
              export AWS_ACCESS_KEY_ID=${AccessKey}
              export AWS_SECRET_ACCESS_KEY=${SecretKey}
              export AWS_SESSION_TOKEN=${SessionToken}
              export AWS_DEFAULT_REGION=us-east-1
              export AWS_ACCOUNT_ID=${AccountId}

              # ── RDS-credentials ophalen uit Secrets Manager ───────────────
              SECRET=$(aws secretsmanager get-secret-value \
                --secret-id "${RDS_SECRET_ARN}" \
                --query SecretString --output text)
              DBUsername=$(echo "$SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['username'])")
              DBPassword=$(echo "$SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")

              # ── Systeem bijwerken en basispakketten installeren ───────────
              dnf update -y
              dnf install -y gcc git unzip curl amazon-efs-utils unixODBC unixODBC-devel

              # ── .NET 10 installeren via het officiële installatiescript ───
              # packages.microsoft.com heeft nog geen AL2023-repo voor .NET 10,
              # daarom gebruiken we het universele dotnet-install.sh script.
              curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
              chmod +x /tmp/dotnet-install.sh
              /tmp/dotnet-install.sh --channel 10.0 --install-dir /usr/share/dotnet
              ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
              export DOTNET_ROOT=/usr/share/dotnet

              # ── Nginx installeren en inschakelen ──────────────────────────
              dnf install -y nginx
              systemctl enable nginx

              # ── EFS mounten (gedeeld bestandssysteem voor logs, REQ-03) ──
              # Alle ASG-instances schrijven logs naar dezelfde EFS-map.
              mkdir -p /mnt/efs
              mount -t efs -o tls ${EFS_DNS}:/ /mnt/efs
              echo "${EFS_DNS}:/ /mnt/efs efs defaults,_netdev 0 0" >> /etc/fstab

              # Sla configuratiewaarden op zodat scripts ze kunnen lezen
              echo "${RDSENDPOINT}" > /mnt/efs/rds-endpoint
              echo "${BucketName}"  > /mnt/efs/s3-name

              # Map voor nginx-logs op EFS aanmaken
              mkdir -p /mnt/efs/nginx

              # ── Nginx configureren als reverse proxy ──────────────────────
              # Nginx stuurt al het verkeer op poort 80 door naar de .NET-app
              # op poort 5000. Logs worden op EFS geschreven (REQ-03).
              cat >/etc/nginx/conf.d/cloudshirt.conf <<'NGINX'
              server {
                  listen 80;
                  server_name _;
                  location / {
                      proxy_pass http://127.0.0.1:5000;
                      proxy_http_version 1.1;
                      proxy_set_header Upgrade $http_upgrade;
                      proxy_set_header Connection keep-alive;
                      proxy_set_header Host $host;
                      proxy_cache_bypass $http_upgrade;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      proxy_buffering off;
                  }
                  # Logs op EFS schrijven zodat ze gedeeld zijn tussen instances (REQ-03)
                  access_log /mnt/efs/nginx/access.log;
                  error_log /mnt/efs/nginx/error.log;
              }
              NGINX

              # ── CloudShirt-applicatie klonen en bouwen ────────────────────
              APPROOT="/opt/cloudshirt"
              PUBLISH="$APPROOT/publish"
              mkdir -p "$APPROOT"
              chown ec2-user:ec2-user "$APPROOT"

              sudo -u ec2-user git clone --branch ${RepoBranch} ${RepoUrl} $APPROOT/src

              # Verbindingsstrings aanpassen naar de RDS-instantie (REQ-04)
              # Buiten bash -lc zodat $DBUsername/$DBPassword correct expanderen
              sed -i "s|Server.*CatalogDb;|Server=${RDSENDPOINT},1433;User ID=$DBUsername;Password=$DBPassword;Initial Catalog=Microsoft.eShopOnWeb.CatalogDb;|" $APPROOT/src/src/Web/appsettings.json
              sed -i "s|Server.*Identity;|Server=${RDSENDPOINT},1433;User ID=$DBUsername;Password=$DBPassword;Initial Catalog=Microsoft.eShopOnWeb.Identity;|" $APPROOT/src/src/Web/appsettings.json

              sudo -u ec2-user bash -lc "
                set -e
                cd $APPROOT/src/src/Web
                dotnet restore
                dotnet publish -c Release -o $PUBLISH
              "

              # ── Systemd-service aanmaken voor de .NET-applicatie ──────────
              # Systemd start de app automatisch bij reboot en herstart hem
              # bij een crash (Restart=always).
              cat >/etc/systemd/system/cloudshirt.service <<'SERVICE'
              [Unit]
              Description=CloudShirt ASP.NET Core Web App
              After=network.target

              [Service]
              WorkingDirectory=/opt/cloudshirt/publish
              ExecStart=/usr/bin/dotnet /opt/cloudshirt/publish/Web.dll
              Restart=always
              RestartSec=5
              KillSignal=SIGINT
              SyslogIdentifier=cloudshirt
              User=ec2-user
              Environment=ASPNETCORE_ENVIRONMENT=Production
              Environment=ASPNETCORE_URLS=http://0.0.0.0:5000

              [Install]
              WantedBy=multi-user.target
              SERVICE

              systemctl daemon-reload
              systemctl enable cloudshirt
              systemctl start cloudshirt
              systemctl restart nginx

              # ── Filebeat installeren voor centrale logging naar ELK (REQ-06) ──
              # Filebeat verstuurt systeemlogs naar Logstash op de ELK-server.
              rpm --import https://artifacts.elastic.co/GPG-KEY-elasticsearch

              cat <<EOF > /etc/yum.repos.d/elastic.repo
              [elastic-8.x]
              name=Elastic repository for 8.x packages
              baseurl=https://artifacts.elastic.co/packages/8.x/yum
              gpgcheck=1
              gpgkey=https://artifacts.elastic.co/GPG-KEY-elasticsearch
              enabled=1
              autorefresh=1
              type=rpm-md
              EOF

              yum install -y filebeat

              # Standaard Elasticsearch-output uitschakelen (we gebruiken Logstash)
              sed -i 's/^output.elasticsearch:/#output.elasticsearch:/' /etc/filebeat/filebeat.yml
              sed -i 's/^  hosts:/#  hosts:/' /etc/filebeat/filebeat.yml

              # Logstash-output configureren (poort 5044)
              cat <<EOT >> /etc/filebeat/filebeat.yml

              output.logstash:
                hosts: ["${ELKPublicIP}:5044"]
              EOT

              # Systeemmodule inschakelen (syslog + auth-logs)
              filebeat modules enable system

              cat <<EOF > /etc/filebeat/modules.d/system.yml
              - module: system
                syslog:
                  enabled: true
                  var.paths: ["/var/log/messages"]
                auth:
                  enabled: true
                  var.paths: ["/var/log/secure"]
              EOF

              systemctl enable filebeat
              systemctl restart filebeat

              # ── mssql-tools installeren (bcp + sqlcmd voor REQ-07) ────────
              # bcp wordt gebruikt door export-orders.sh om de ordertabel
              # naar S3 te exporteren. AL2023 is RHEL 9-compatibel.
              curl -sSL https://packages.microsoft.com/config/rhel/9/prod.repo \
                -o /etc/yum.repos.d/mssql-release.repo
              ACCEPT_EULA=Y dnf install -y msodbcsql18 mssql-tools18

              echo 'export PATH="$PATH:/opt/mssql-tools18/bin"' > /etc/profile.d/mssql-tools.sh
              chmod +x /etc/profile.d/mssql-tools.sh

              # ── Scripts downloaden van de repository ──────────────────────
              # Hierdoor zijn de scripts beschikbaar op elke instance die start,
              # zonder dat ze in de AMI gebakken hoeven te worden.
              cd /home/ec2-user

              curl -fsSL -O https://raw.githubusercontent.com/Stensel8/cloud-engineering/main/cloud-automation-concepts/Assignment%201%20-%20AWS%20Basics/export-orders.sh
              chmod +x export-orders.sh

              curl -fsSL -O https://raw.githubusercontent.com/Stensel8/cloud-engineering/main/cloud-automation-concepts/Assignment%201%20-%20AWS%20Basics/configure-aws.sh

              # AWS-credentials invullen in het configuratiescript
              sed -i \
                -e "s|<acceskey>|${AccessKey}|g" \
                -e "s|<secretaccesskey>|${SecretKey}|g" \
                -e "s|<sessiontoken>|${SessionToken}|g" \
                -e "s|<accountid>|${AccountId}|g" \
                /home/ec2-user/configure-aws.sh

              chmod +x configure-aws.sh

            - RDSENDPOINT:    !ImportValue cloudshirt-rds:RDSEndpointAddress
              RDS_SECRET_ARN: !ImportValue cloudshirt-rds:RDSSecretArn
              EFS_DNS:        !ImportValue cloudshirt-efs:EFSDNS
              ELKPublicIP:    !ImportValue cloudshirt-elk:ELKPublicIP

  # -------------------------------------------------------------------------
  # Auto Scaling Group
  #
  # Minimaal 2 instances (1 per AZ) voor high availability (REQ-01).
  # Maximaal 3 instances tijdens piekuren (REQ-02).
  # -------------------------------------------------------------------------
  CloudShirtASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: CloudShirtASG
      LaunchTemplate:
        LaunchTemplateId: !Ref CloudShirtLaunchTemplate
        Version: !GetAtt CloudShirtLaunchTemplate.LatestVersionNumber
      MinSize: 2
      MaxSize: 3
      DesiredCapacity: 2
      VPCZoneIdentifier:
        - !ImportValue cloudshirt-network:CloudShirtFirstSubnet
        - !ImportValue cloudshirt-network:CloudShirtSecondSubnet
      TargetGroupARNs:
        - !ImportValue cloudshirt-lb:WebTargetGroup
      Tags:
        - Key: Name
          Value: CloudShirt-Web-ASG
          PropagateAtLaunch: true

  # ── Geplande schaalacties (REQ-02) ────────────────────────────────────────

  # Opschalen naar 3 instances om 18:00 ET (23:00 UTC in winter / 22:00 UTC in zomer)
  ScaleOutScheduledAction:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref CloudShirtASG
      ScheduledActionName: ScaleOutSpikeHours
      DesiredCapacity: 3
      Recurrence: "0 23 * * *"   # 18:00 EST (UTC-5) / 19:00 EDT (UTC-4)

  # Terugschalen naar 2 instances om 20:00 ET (01:00 UTC volgende dag)
  ScaleInScheduledAction:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref CloudShirtASG
      ScheduledActionName: ScaleInAfterSpike
      DesiredCapacity: 2
      Recurrence: "0 1 * * *"    # 20:00 EST (UTC-5) / 21:00 EDT (UTC-4)
