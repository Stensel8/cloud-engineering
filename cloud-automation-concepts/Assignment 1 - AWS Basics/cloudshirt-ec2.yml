AWSTemplateFormatVersion: 2010-09-09
Description: >
  CloudShirt EC2-webservers (REQ-01). Twee instances over twee AZ's via
  een LaunchTemplate. Installeert .NET 10, nginx, CloudShirt en Filebeat.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  # AWS-credentials worden doorgegeven vanuit het deployment-script.
  # Ze worden in de UserData gebruikt om de AWS CLI aan te roepen op de instance.
  AccessKey:
    Type: String
    NoEcho: true
  SecretKey:
    Type: String
    NoEcho: true
  SessionToken:
    Type: String
    NoEcho: true
  AccountId:
    Type: String

  InstanceType:
    Type: String
    Default: t3.medium
    # t3.small (2 GB) knalt out-of-memory tijdens de dotnet-build + filebeat-installatie.
    # t3.medium (4 GB) is het minimum voor deze stack.
    Description: EC2 instance type (minimaal t3.medium vanwege dotnet-build + filebeat geheugengebruik)

  BucketName:
    Type: String
    Description: Naam van de S3-bucket voor RDS-exports

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Naam van een bestaand EC2 KeyPair voor SSH-toegang
    Default: vockey

  RepoUrl:
    Type: String
    Default: https://github.com/stensel8/CloudShirt.git
    Description: Git-repository URL van de CloudShirt-applicatie

  RepoBranch:
    Type: String
    Default: main
    Description: Branch om te klonen

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # -------------------------------------------------------------------------
  # LaunchTemplate — gedeelde configuratie voor beide webservers
  #
  # Door de UserData hier één keer te definiëren vermijden we duplicatie.
  # WebInstance1 en WebInstance2 verwijzen allebei naar deze template.
  # Dit is hetzelfde patroon dat de Auto Scaling Group (cloudshirt-asg.yml)
  # ook gebruikt.
  # -------------------------------------------------------------------------
  WebServerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: CloudShirt-WebServer
      LaunchTemplateData:
        ImageId: ami-0190ba1cb5ab4e9e8   # Amazon Linux 2023 AMI (64-bit x86)
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Name: LabInstanceProfile   # Vereist voor SSM Session Manager
        SecurityGroupIds:
          - !ImportValue cloudshirt-network:InstanceSG
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash -xe

              # ── AWS-credentials instellen ─────────────────────────────────────────────────
              export AWS_ACCESS_KEY_ID=${AccessKey}
              export AWS_SECRET_ACCESS_KEY=${SecretKey}
              export AWS_SESSION_TOKEN=${SessionToken}
              export AWS_DEFAULT_REGION=us-east-1
              export AWS_ACCOUNT_ID=${AccountId}

              # ── RDS-credentials ophalen uit Secrets Manager ───────────────────────────────
              SECRET=$(aws secretsmanager get-secret-value \
                  --secret-id "${RDS_SECRET_ARN}" \
                  --query SecretString --output text)
              DBUsername=$(echo "$SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['username'])")
              DBPassword=$(echo "$SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")

              # ── Pakketten installeren ─────────────────────────────────────────────────────
              # --allowerasing: voorkomt curl/curl-minimal conflict op Amazon Linux 2023
              dnf install -y --allowerasing \
                  gcc git unzip curl libicu cronie \
                  amazon-efs-utils postgresql18 \
                  unixODBC unixODBC-devel

              # ── .NET 10 installeren ───────────────────────────────────────────────────────
              # packages.microsoft.com heeft nog geen AL2023-repo voor .NET 10;
              # het universele installatiescript werkt op alle distributies.
              curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
              chmod +x /tmp/dotnet-install.sh
              /tmp/dotnet-install.sh --channel 10.0 --install-dir /usr/share/dotnet
              ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
              export DOTNET_ROOT=/usr/share/dotnet

              # ── Nginx installeren ─────────────────────────────────────────────────────────
              dnf install -y nginx
              systemctl enable nginx

              # ── EFS mounten (gedeeld bestandssysteem voor logs, REQ-03) ──────────────────
              mkdir -p /mnt/efs
              mount -t efs -o tls ${EFS_DNS}:/ /mnt/efs
              echo "${EFS_DNS}:/ /mnt/efs efs defaults,_netdev 0 0" >> /etc/fstab
              mkdir -p /mnt/efs/nginx

              # Configuratiewaarden opslaan op EFS zodat scripts ze kunnen lezen
              echo "${RDSENDPOINT}" > /mnt/efs/rds-endpoint
              echo "${BucketName}"  > /mnt/efs/s3-name
              echo "$DBPassword"    > /mnt/efs/db-password

              # ── Config-bestanden ophalen van S3 ───────────────────────────────────────────
              # Losse bestanden in Git, geupload door Deploy-CloudShirt.ps1 voor deze stack.
              aws s3 cp "s3://${BucketName}/config/nginx-cloudshirt.conf" /etc/nginx/conf.d/cloudshirt.conf
              aws s3 cp "s3://${BucketName}/config/cloudshirt.service"    /etc/systemd/system/cloudshirt.service
              aws s3 cp "s3://${BucketName}/config/elastic.repo"          /etc/yum.repos.d/elastic.repo
              aws s3 cp "s3://${BucketName}/config/filebeat-system.yml"   /tmp/filebeat-system.yml

              # ── CloudShirt klonen en bouwen ───────────────────────────────────────────────
              APPROOT="/opt/cloudshirt"
              PUBLISH="$APPROOT/publish"
              mkdir -p "$APPROOT"
              chown ec2-user:ec2-user "$APPROOT"

              sudo -u ec2-user git clone --branch ${RepoBranch} ${RepoUrl} "$APPROOT/src"

              # HTTPS-redirect verwijderen: ALB is HTTP-only (geen ACM-certificaat).
              # Zonder deze regel mislukken ALB health checks en krijgen gebruikers
              # een redirect-loop.
              sed -i '/app\.UseHttpsRedirection/d' "$APPROOT/src/src/Web/Program.cs"

              # ── .env schrijven met verbindingsstrings en app-config (REQ-04) ─────────────
              # ASP.NET Core leest KEY__SUBKEY als geneste config (overschrijft appsettings).
              # Wachtwoord tussen aanhalingstekens zodat puntkomma's geen problemen geven
              # in de ADO.NET/Npgsql connection string parser.
              # baseUrls overschrijven de standaard localhost:44315-waarden uit appsettings;
              # zonder dit probeert Blazor SSR een HTTPS-verbinding met zichzelf en crasht.
              {
                  echo "UseOnlyInMemoryDatabase=false"
                  echo "DatabaseProvider=postgres"
                  echo "ConnectionStrings__CatalogConnection=Host=${RDSENDPOINT};Port=5432;Database=eshop_catalog;Username=$DBUsername;Password=\"$DBPassword\";"
                  echo "ConnectionStrings__IdentityConnection=Host=${RDSENDPOINT};Port=5432;Database=eshop_identity;Username=$DBUsername;Password=\"$DBPassword\";"
                  echo "baseUrls__webBase=http://localhost:5000/"
                  echo "baseUrls__apiBase=http://localhost:5000/api/"
              } > /opt/cloudshirt/.env

              sudo -u ec2-user bash -lc "
                  set -e
                  cd $APPROOT/src/src/Web
                  dotnet restore
                  dotnet publish -c Release -o $PUBLISH
              "

              # Geheugen vrijgeven dat de Roslyn-compiler achterlaat
              dotnet build-server shutdown || true

              # ── CloudShirt starten ────────────────────────────────────────────────────────
              systemctl daemon-reload
              systemctl enable cloudshirt
              systemctl start cloudshirt
              systemctl restart nginx

              # ── Filebeat installeren voor centrale logging naar ELK (REQ-06) ─────────────
              rpm --import https://artifacts.elastic.co/GPG-KEY-elasticsearch
              dnf install -y filebeat

              # Elasticsearch-output uitschakelen; Logstash-output toevoegen
              sed -i 's/^output.elasticsearch:/#output.elasticsearch:/' /etc/filebeat/filebeat.yml
              sed -i 's/^  hosts:/#  hosts:/'                          /etc/filebeat/filebeat.yml

              {
                  echo ""
                  echo "output.logstash:"
                  echo "  hosts: [\"${ELKPublicIP}:5044\"]"
              } >> /etc/filebeat/filebeat.yml

              # Systeemmodule inschakelen (syslog + auth-logs) via config van S3
              filebeat modules enable system
              cp /tmp/filebeat-system.yml /etc/filebeat/modules.d/system.yml

              systemctl enable filebeat
              systemctl restart filebeat

              # ── Export-script ophalen van S3 en cron-job instellen (REQ-07) ──────────────
              # Script is tijdens deployment geupload naar S3 door Deploy-CloudShirt.ps1.
              # Zo is de deployment deterministisch: geen afhankelijkheid van externe Git-URL.
              cd /home/ec2-user

              aws s3 cp "s3://${BucketName}/scripts/export-orders.sh"  export-orders.sh
              chmod +x export-orders.sh

              # Dagelijkse cron-job instellen: export draait elke nacht om 02:00
              echo "0 2 * * * ec2-user /home/ec2-user/export-orders.sh >> /var/log/export-orders.log 2>&1" \
                  > /etc/cron.d/cloudshirt-export

            - RDSENDPOINT:    !ImportValue cloudshirt-rds:RDSEndpointAddress
              RDS_SECRET_ARN: !ImportValue cloudshirt-rds:RDSSecretArn
              EFS_DNS:        !ImportValue cloudshirt-efs:EFSDNS
              ELKPublicIP:    !ImportValue cloudshirt-elk:ELKPublicIP

  # -------------------------------------------------------------------------
  # WebInstance1 — publiek subnet in AZ1 (us-east-1a)
  # -------------------------------------------------------------------------
  WebInstance1:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref WebServerLaunchTemplate
        Version: !GetAtt WebServerLaunchTemplate.LatestVersionNumber
      SubnetId: !ImportValue cloudshirt-network:CloudShirtFirstSubnet
      Tags:
        - Key: Name
          Value: CloudShirt-Web-1
        - Key: Project
          Value: CloudShirt
        - Key: Environment
          Value: dev

  # -------------------------------------------------------------------------
  # WebInstance2 — publiek subnet in AZ2 (us-east-1b)
  #
  # Door een tweede instance in een andere AZ te draaien, blijft de applicatie
  # beschikbaar als één AZ uitvalt (REQ-01: high availability).
  # -------------------------------------------------------------------------
  WebInstance2:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref WebServerLaunchTemplate
        Version: !GetAtt WebServerLaunchTemplate.LatestVersionNumber
      SubnetId: !ImportValue cloudshirt-network:CloudShirtSecondSubnet
      Tags:
        - Key: Name
          Value: CloudShirt-Web-2
        - Key: Project
          Value: CloudShirt
        - Key: Environment
          Value: dev

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  Instance1Id:
    Description: EC2 Instance 1 ID
    Value: !Ref WebInstance1
    Export:
      Name: !Sub "${AWS::StackName}:Instance1"

  Instance2Id:
    Description: EC2 Instance 2 ID
    Value: !Ref WebInstance2
    Export:
      Name: !Sub "${AWS::StackName}:Instance2"
