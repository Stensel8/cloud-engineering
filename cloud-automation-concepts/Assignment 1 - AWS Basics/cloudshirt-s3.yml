AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket voor RDS data met access logging

Parameters:
  BucketName:
    Type: String
    Description: Naam van de S3 bucket
    Default: rds-export-bucket-cloudshirt-luca

Resources:
  RDSExportBucketLogs:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketName}-logs"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  RDSExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref RDSExportBucketLogs
        LogFilePrefix: access-logs/

Outputs:
  BucketName:
    Description: Naam van de bucket
    Value: !Ref RDSExportBucket

  BucketArn:
    Description: ARN van de bucket
    Value: !GetAtt RDSExportBucket.Arn
