AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudShirt S3-stack (REQ-07).
  Voorziet in een S3-bucket voor RDS-exports van de ordertabel.
  Publieke toegang is volledig geblokkeerd.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  BucketName:
    Type: String
    Description: Naam van de S3-bucket voor RDS-exports

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  RDSExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  BucketName:
    Description: Naam van de RDS-exportbucket
    Value: !Ref RDSExportBucket

  BucketArn:
    Description: ARN van de RDS-exportbucket
    Value: !GetAtt RDSExportBucket.Arn
