AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudShirt S3 (REQ-07). Bucket voor dagelijkse order-exports.
  Publieke toegang geblokkeerd.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  BucketName:
    Type: String
    Description: Naam van de S3-bucket voor RDS-exports

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  RDSExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        LogFilePrefix: access-logs/

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  BucketName:
    Description: Naam van de RDS-exportbucket
    Value: !Ref RDSExportBucket

  BucketArn:
    Description: ARN van de RDS-exportbucket
    Value: !GetAtt RDSExportBucket.Arn
