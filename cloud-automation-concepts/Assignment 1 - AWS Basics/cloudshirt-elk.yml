AWSTemplateFormatVersion: 2010-09-09
Description: >
  CloudShirt ELK-stack (REQ-05, REQ-06).
  Installeert Elastic Stack v8.x (Elasticsearch, Logstash, Kibana) op
  een enkele EC2-instance voor gecentraliseerde logverwerking.
  Filebeat op de webservers verstuurt logs naar Logstash op poort 5044.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Naam van een bestaand EC2 KeyPair voor SSH-toegang
    Default: vockey

  SSHCidr:
    Description: IP-bereik dat SSH-toegang heeft tot de ELK-instance
    Type: String
    Default: 10.0.0.0/16

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Security Group ────────────────────────────────────────────────────────
  # Opent de benodigde poorten voor SSH, Elasticsearch, Logstash en Kibana.
  ELKSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Sta SSH en ELK-verkeer toe
      VpcId: !ImportValue cloudshirt-network:VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHCidr
          Description: SSH-toegang vanuit het interne netwerk
        - IpProtocol: tcp
          FromPort: 9200
          ToPort: 9200
          CidrIp: 0.0.0.0/0
          Description: Elasticsearch HTTP API
        - IpProtocol: tcp
          FromPort: 9300
          ToPort: 9300
          CidrIp: 0.0.0.0/0
          Description: Elasticsearch transport (cluster-communicatie)
        - IpProtocol: tcp
          FromPort: 5044
          ToPort: 5044
          CidrIp: 0.0.0.0/0
          Description: Logstash Beats-ingang (van Filebeat op webservers)
        - IpProtocol: tcp
          FromPort: 5601
          ToPort: 5601
          CidrIp: 0.0.0.0/0
          Description: Kibana webinterface
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Alle uitgaande verbindingen toestaan
      Tags:
        - Key: Name
          Value: CloudShirt-ELK-SG
        - Key: Project
          Value: CloudShirt
        - Key: Environment
          Value: dev

  # ── ELK EC2-instance ──────────────────────────────────────────────────────
  # t3.large met 20 GB opslag. De UserData installeert en configureert
  # Elasticsearch, Logstash en Kibana automatisch bij het opstarten.
  ELKInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0190ba1cb5ab4e9e8   # Amazon Linux 2023 AMI (64-bit x86)
      InstanceType: t3.large
      KeyName: !Ref KeyName
      SubnetId: !ImportValue cloudshirt-network:CloudShirtSecondSubnet
      SecurityGroupIds:
        - !Ref ELKSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: CloudShirt-ELK
        - Key: Project
          Value: CloudShirt
        - Key: Environment
          Value: dev
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e

          # ── Java 11 installeren (vereist door Elasticsearch) ──────────────
          sudo yum install -y java-11-amazon-corretto

          # ── Elastic yum-repository toevoegen ─────────────────────────────
          sudo tee /etc/yum.repos.d/elasticsearch.repo > /dev/null <<EOF
          [elasticsearch]
          name=Elasticsearch repository for 8.x packages
          baseurl=https://artifacts.elastic.co/packages/8.x/yum
          gpgcheck=1
          gpgkey=https://artifacts.elastic.co/GPG-KEY-elasticsearch
          enabled=1
          autorefresh=1
          type=rpm-md
          EOF

          sudo rpm --import https://artifacts.elastic.co/GPG-KEY-elasticsearch
          sudo yum clean all
          sudo yum makecache

          # ── Elasticsearch installeren en configureren ─────────────────────
          sudo yum install -y elasticsearch

          sudo mkdir -p /var/log/elasticsearch /var/lib/elasticsearch
          sudo chown -R elasticsearch:elasticsearch /var/log/elasticsearch /var/lib/elasticsearch /etc/elasticsearch
          sudo chmod 750 /var/log/elasticsearch /var/lib/elasticsearch /etc/elasticsearch

          sudo tee /etc/elasticsearch/elasticsearch.yml > /dev/null <<EOF
          cluster.name: elk-cluster
          node.name: node-1
          network.host: 0.0.0.0
          http.port: 9200
          discovery.type: single-node
          xpack.security.enabled: false
          path.logs: /var/log/elasticsearch
          path.data: /var/lib/elasticsearch
          EOF

          sudo rm -f /etc/elasticsearch/elasticsearch.keystore
          sudo -u elasticsearch /usr/share/elasticsearch/bin/elasticsearch-keystore create

          sudo systemctl daemon-reload
          sudo systemctl enable elasticsearch.service
          sudo systemctl restart elasticsearch.service
          sleep 10

          # ── Logstash installeren en configureren ──────────────────────────
          # Ontvangt Beats-input op poort 5044 en schrijft naar Elasticsearch.
          sudo yum install -y logstash

          sudo tee /etc/logstash/conf.d/logstash.conf > /dev/null <<'EOF'
          input { beats { port => 5044 } }
          output {
            elasticsearch {
              hosts => ["http://localhost:9200"]
              manage_template => false
              index => "%{[@metadata][beat]}-%{[@metadata][version]}-%{+YYYY.MM.dd}"
            }
          }
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable logstash.service
          sudo systemctl start logstash.service

          # ── Kibana installeren en configureren ────────────────────────────
          # Luistert op alle interfaces zodat het via het publieke IP bereikbaar is.
          sudo yum install -y kibana
          sudo sed -i 's|#server.host:.*|server.host: "0.0.0.0"|' /etc/kibana/kibana.yml
          sudo sed -i 's|#elasticsearch.hosts:.*|elasticsearch.hosts: ["http://localhost:9200"]|' /etc/kibana/kibana.yml

          sudo systemctl daemon-reload
          sudo systemctl enable kibana.service
          sudo systemctl start kibana.service

          # ── Filebeat dashboards installeren ──────────────────────────────
          sudo yum install -y filebeat
          sudo filebeat setup --dashboards

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  ELKPublicIP:
    Description: Publiek IP-adres van de ELK-instance
    Value: !GetAtt ELKInstance.PublicIp
    Export:
      Name: !Sub "${AWS::StackName}:ELKPublicIP"

  ELKSecurityGroupExport:
    Description: Security Group ID voor ELK
    Value: !Ref ELKSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}:ELKSecurityGroup"
