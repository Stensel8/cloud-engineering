AWSTemplateFormatVersion: 2010-09-09
Description: >
  CloudShirt netwerk-stack. VPC, subnets in twee AZ's,
  Internet Gateway, NAT Gateway en security groups.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  VPCCIDR:
    Description: IP-bereik (CIDR) voor de VPC.
    Type: String
    Default: 10.0.0.0/16

  PublicSubnet1CIDR:
    Description: IP-bereik (CIDR) voor publiek subnet 1 (AZ1).
    Type: String
    Default: 10.0.1.0/24

  PublicSubnet2CIDR:
    Description: IP-bereik (CIDR) voor publiek subnet 2 (AZ2).
    Type: String
    Default: 10.0.2.0/24

  PrivateSubnet1CIDR:
    Description: IP-bereik (CIDR) voor privaat subnet 1 (AZ1).
    Type: String
    Default: 10.0.51.0/24

  PrivateSubnet2CIDR:
    Description: IP-bereik (CIDR) voor privaat subnet 2 (AZ2).
    Type: String
    Default: 10.0.52.0/24

  AvailabilityZone1:
    Description: Naam van de eerste Availability Zone.
    Type: String
    Default: us-east-1a

  AvailabilityZone2:
    Description: Naam van de tweede Availability Zone.
    Type: String
    Default: us-east-1b

  SSHCidr:
    Description: IP-bereik dat SSH-toegang heeft tot EC2-instances.
    Type: String
    Default: 10.0.0.0/16

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── VPC ──────────────────────────────────────────────────────────────────
  CloudShirtVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CloudShirtVpc
        - Key: Environment
          Value: dev
        - Key: Project
          Value: CloudShirt
        - Key: Owner
          Value: TeamCloudShirt

  # ── Internet Gateway ─────────────────────────────────────────────────────
  CloudShirtInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: CloudShirtInternetGateway
        - Key: Project
          Value: CloudShirt

  # Koppel de Internet Gateway aan de VPC
  CloudShirtVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref CloudShirtInternetGateway
      VpcId: !Ref CloudShirtVpc

  # ── Publieke subnets (REQ-01: high availability over twee AZ's) ──────────
  CloudShirtFirstSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Ref AvailabilityZone1
      MapPublicIpOnLaunch: true
      VpcId: !Ref CloudShirtVpc
      Tags:
        - Key: Name
          Value: CloudShirtPublicSubnet1
        - Key: Environment
          Value: dev
        - Key: Project
          Value: CloudShirt

  CloudShirtSecondSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Ref AvailabilityZone2
      MapPublicIpOnLaunch: true
      VpcId: !Ref CloudShirtVpc
      Tags:
        - Key: Name
          Value: CloudShirtPublicSubnet2
        - Key: Environment
          Value: dev
        - Key: Project
          Value: CloudShirt

  # ── Publieke routetabel ───────────────────────────────────────────────────
  CloudShirtRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CloudShirtVpc
      Tags:
        - Key: Name
          Value: CloudShirtPublicRouteTable
        - Key: Project
          Value: CloudShirt

  # Standaardroute voor internet-verkeer via de Internet Gateway
  CloudShirtDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: CloudShirtVPCGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref CloudShirtInternetGateway
      RouteTableId: !Ref CloudShirtRouteTable

  # Koppel publieke subnets aan de publieke routetabel
  CloudShirtFirstSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref CloudShirtRouteTable
      SubnetId: !Ref CloudShirtFirstSubnet

  CloudShirtSecondSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref CloudShirtRouteTable
      SubnetId: !Ref CloudShirtSecondSubnet

  # ── Private subnets (voor RDS en interne services) ───────────────────────
  CloudShirtFirstPrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Ref AvailabilityZone1
      VpcId: !Ref CloudShirtVpc
      Tags:
        - Key: Name
          Value: CloudShirtPrivateSubnet1
        - Key: Environment
          Value: dev
        - Key: Project
          Value: CloudShirt

  CloudShirtSecondPrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Ref AvailabilityZone2
      VpcId: !Ref CloudShirtVpc
      Tags:
        - Key: Name
          Value: CloudShirtPrivateSubnet2
        - Key: Environment
          Value: dev
        - Key: Project
          Value: CloudShirt

  # ── NAT Gateway (in publiek subnet 1, voor uitgaand verkeer van private subnets) ──
  CloudShirtNatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: CloudShirtNatEIP
        - Key: Project
          Value: CloudShirt

  CloudShirtNatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt CloudShirtNatEIP.AllocationId
      SubnetId: !Ref CloudShirtFirstSubnet
      Tags:
        - Key: Name
          Value: CloudShirtNatGateway
        - Key: Project
          Value: CloudShirt

  # ── Private routetabel ────────────────────────────────────────────────────
  CloudShirtPrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CloudShirtVpc
      Tags:
        - Key: Name
          Value: CloudShirtPrivateRouteTable
        - Key: Project
          Value: CloudShirt

  # Uitgaand verkeer van private subnets via de NAT Gateway
  CloudShirtPrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref CloudShirtNatGateway
      RouteTableId: !Ref CloudShirtPrivateRouteTable

  # Koppel private subnets aan de private routetabel
  CloudShirtPrivateSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref CloudShirtPrivateRouteTable
      SubnetId: !Ref CloudShirtFirstPrivateSubnet

  CloudShirtPrivateSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref CloudShirtPrivateRouteTable
      SubnetId: !Ref CloudShirtSecondPrivateSubnet

  # ── Security Groups ───────────────────────────────────────────────────────

  # EC2-instances: SSH (intern), HTTP en HTTPS (publiek)
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_24
            comment: "Poort 80 moet open zijn voor publieke ALB/webserver-traffic"
    Properties:
      GroupDescription: Sta SSH, HTTP en HTTPS toe
      VpcId: !Ref CloudShirtVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHCidr
          Description: SSH-toegang vanuit het interne netwerk
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP-verkeer van het internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS-verkeer van het internet
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Alle uitgaande verbindingen toestaan
      Tags:
        - Key: Name
          Value: CloudShirt-EC2-SG
        - Key: Project
          Value: CloudShirt
        - Key: Environment
          Value: dev

  # RDS: PostgreSQL-poort alleen bereikbaar vanuit de VPC (REQ-04)
  # Poort 5432 is de standaardpoort voor PostgreSQL.
  # Publieke toegang is niet toegestaan; alleen de EC2-instances binnen de VPC
  # kunnen verbinding maken met de database.
  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Sta PostgreSQL-verkeer toe vanuit de VPC
      VpcId: !Ref CloudShirtVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16
          Description: PostgreSQL-toegang vanuit de VPC
      Tags:
        - Key: Name
          Value: CloudShirt-RDS-SG
        - Key: Project
          Value: CloudShirt
        - Key: Environment
          Value: dev

# ---------------------------------------------------------------------------
# Outputs — geexporteerd voor gebruik door andere stacks
# ---------------------------------------------------------------------------
Outputs:

  VPCRef:
    Description: VPC ID
    Value: !Ref CloudShirtVpc
    Export:
      Name: !Sub "${AWS::StackName}:VPC"

  CloudShirtFirstSubnetRef:
    Description: Publiek subnet 1 (AZ1)
    Value: !Ref CloudShirtFirstSubnet
    Export:
      Name: !Sub "${AWS::StackName}:CloudShirtFirstSubnet"

  CloudShirtSecondSubnetRef:
    Description: Publiek subnet 2 (AZ2)
    Value: !Ref CloudShirtSecondSubnet
    Export:
      Name: !Sub "${AWS::StackName}:CloudShirtSecondSubnet"

  CloudShirtFirstPrivateSubnetRef:
    Description: Privaat subnet 1 (AZ1)
    Value: !Ref CloudShirtFirstPrivateSubnet
    Export:
      Name: !Sub "${AWS::StackName}:CloudShirtFirstPrivateSubnet"

  CloudShirtSecondPrivateSubnetRef:
    Description: Privaat subnet 2 (AZ2)
    Value: !Ref CloudShirtSecondPrivateSubnet
    Export:
      Name: !Sub "${AWS::StackName}:CloudShirtSecondPrivateSubnet"

  AvailabilityZone1Ref:
    Description: Eerste Availability Zone
    Value: !Ref AvailabilityZone1
    Export:
      Name: !Sub "${AWS::StackName}:AvailabilityZone1"

  AvailabilityZone2Ref:
    Description: Tweede Availability Zone
    Value: !Ref AvailabilityZone2
    Export:
      Name: !Sub "${AWS::StackName}:AvailabilityZone2"

  InstanceSecurityGroupRef:
    Description: Security group voor EC2-instances
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}:InstanceSG"

  RdsSecurityGroupRef:
    Description: Security group voor RDS
    Value: !Ref RdsSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}:rdsSG"
