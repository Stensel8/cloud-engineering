AWSTemplateFormatVersion: 2010-09-09
Description: >
  CloudShirt RDS (REQ-04). PostgreSQL 16 in private subnets,
  credentials via Secrets Manager.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  DBAllocatedStorage:
    Type: Number
    Default: 20
    Description: Opslaggrootte van de database in GB

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Subnet Group — database in de private subnets van de VPC ─────────────
  # Door de RDS-instance in private subnets te plaatsen is hij niet
  # bereikbaar vanaf het internet (REQ-04: veilige databaseopslag).
  CloudShirtDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: CloudShirt RDS subnet group
      SubnetIds:
        - !ImportValue cloudshirt-network:CloudShirtFirstPrivateSubnet
        - !ImportValue cloudshirt-network:CloudShirtSecondPrivateSubnet
      Tags:
        - Key: Name
          Value: CloudShirt-DBSubnetGroup

  # ── Secrets Manager Secret — automatisch gegenereerde credentials ─────────
  # AWS genereert een sterk wachtwoord (20 tekens) en slaat het veilig op.
  # De EC2-instances halen de credentials op via de AWS CLI bij het opstarten,
  # zodat het wachtwoord nooit in de CloudFormation-template of UserData staat.
  CloudShirtDBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Credentials for CloudShirt RDS master user
      GenerateSecretString:
        SecretStringTemplate: '{"username":"csadmin"}'
        GenerateStringKey: password
        PasswordLength: 20
        ExcludeCharacters: '"@/\\;'  # puntkomma breekt ADO.NET/Npgsql connection strings

  # ── RDS PostgreSQL-instance ───────────────────────────────────────────────
  # PostgreSQL 16 — de database die de CloudShirt-applicatie verwacht.
  # db.t3.micro is voldoende voor de demo-omgeving (REQ-04).
  # Multi-AZ en monitoring zijn uitgeschakeld om kosten te besparen.
  # Opslag is versleuteld; automatische back-up bewaart 1 dag.
  CloudShirtRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: cloudshirt-db
      Engine: postgres
      EngineVersion: "16"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: !Ref DBAllocatedStorage
      # Initiële database; de app maakt eshop_catalog en eshop_identity zelf aan
      # via EF Core EnsureCreatedAsync() bij de eerste opstart.
      DBName: postgres
      MasterUsername: !Sub "{{resolve:secretsmanager:${CloudShirtDBSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${CloudShirtDBSecret}:SecretString:password}}"
      StorageEncrypted: true
      MonitoringInterval: 0
      VPCSecurityGroups:
        - !ImportValue cloudshirt-network:rdsSG
      DBSubnetGroupName: !Ref CloudShirtDBSubnetGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 1
      MultiAZ: false
      StorageType: gp2
      DeletionProtection: false
    # Bij verwijdering wordt een snapshot gemaakt zodat data niet verloren gaat.
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot

# ---------------------------------------------------------------------------
# Outputs — geexporteerd voor gebruik door EC2- en ASG-stacks
# ---------------------------------------------------------------------------
Outputs:

  RDSEndpointAddress:
    Description: Hostname van het RDS PostgreSQL-endpoint
    Value: !GetAtt CloudShirtRDSInstance.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}:RDSEndpointAddress"

  RDSSecretArn:
    Description: ARN van het Secrets Manager-secret met de database-credentials
    Value: !Ref CloudShirtDBSecret
    Export:
      Name: !Sub "${AWS::StackName}:RDSSecretArn"
