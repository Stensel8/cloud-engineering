AWSTemplateFormatVersion: 2010-09-09
Description: >
  CloudShirt Application Load Balancer-stack (REQ-01).
  Verdeelt inkomend verkeer over de webserver-instances in twee AZ's
  via één URL. Ondersteunt optionele HTTPS met een ACM-certificaat:
  als een certificaat is opgegeven, worden HTTP-verzoeken automatisch
  doorgestuurd naar HTTPS (301 redirect).

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  CertificateArn:
    Type: String
    Description: ARN van het ACM-certificaat voor de HTTPS-listener (leeg = alleen HTTP)
    Default: ""

  LogBucketName:
    Type: String
    Description: Naam van de S3-bucket voor ALB access logs (leeg = logging uitgeschakeld)
    Default: ""

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  # Gebruik HTTPS als er een certificaat is opgegeven
  HasCertificate:   !Not [!Equals [!Ref CertificateArn, ""]]
  HasNoCertificate: !Equals [!Ref CertificateArn, ""]
  HasLogBucket:     !Not [!Equals [!Ref LogBucketName, ""]]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Target Group — verwijst naar de EC2-webserver-instances ─────────────
  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !ImportValue cloudshirt-network:VPC
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckPath: /
      Targets:
        - Id: !ImportValue cloudshirt-ec2:Instance1
        - Id: !ImportValue cloudshirt-ec2:Instance2

  # ── Application Load Balancer ────────────────────────────────────────────
  # Publiek toegankelijk, verdeeld over twee publieke subnets (twee AZ's).
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: cloudshirt-alb
      Subnets:
        - !ImportValue cloudshirt-network:CloudShirtFirstSubnet
        - !ImportValue cloudshirt-network:CloudShirtSecondSubnet
      SecurityGroups:
        - !ImportValue cloudshirt-network:InstanceSG
      Scheme: internet-facing
      Type: application
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
        - !If
          - HasLogBucket
          - Key: access_logs.s3.enabled
            Value: "true"
          - !Ref AWS::NoValue
        - !If
          - HasLogBucket
          - Key: access_logs.s3.bucket
            Value: !Ref LogBucketName
          - !Ref AWS::NoValue

  # ── HTTP-listener: redirect naar HTTPS (alleen met certificaat) ──────────
  HTTPListenerRedirect:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # ── HTTP-listener: direct doorsturen (geen certificaat opgegeven) ────────
  HTTPListenerForward:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasNoCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  # ── HTTPS-listener: doorsturen naar target group (alleen met certificaat) ─
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  LoadBalancerDNSName:
    Description: Publieke URL van CloudShirt (ALB DNS-naam)
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}:LoadBalancerDNS"

  WebTargetGroup:
    Description: ARN van de Target Group
    Value: !Ref WebTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}:WebTargetGroup"
