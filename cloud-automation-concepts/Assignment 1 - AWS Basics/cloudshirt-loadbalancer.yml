Description: >
  CloudShirt Application Load Balancer Stack
  - Load Balancer (LB) with HTTPS and HTTP-to-HTTPS redirect
  - Target group voor EC2-instances
  - Exporteert DNS-naam als output

Parameters:
  CertificateArn:
    Type: String
    Description: ARN of the ACM certificate for HTTPS listener
    Default: ""
  LogBucketName:
    Type: String
    Description: Name of the S3 bucket for ALB access logs
    Default: ""

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]
  HasNoCertificate: !Equals [!Ref CertificateArn, ""]
  HasLogBucket: !Not [!Equals [!Ref LogBucketName, ""]]

Resources:
  # EC2-instances
  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !ImportValue cloudshirt-network:VPC
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckPath: /
      Targets:
        - Id: !ImportValue cloudshirt-ec2:Instance1
        - Id: !ImportValue cloudshirt-ec2:Instance2

  # Loadbalancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: cloudshirt-alb
      Subnets:
        - !ImportValue cloudshirt-network:CloudShirtFirstSubnet
        - !ImportValue cloudshirt-network:CloudShirtSecondSubnet
      SecurityGroups:
        - !ImportValue cloudshirt-network:InstanceSG
      Scheme: internet-facing
      Type: application
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
        - !If
          - HasLogBucket
          - Key: access_logs.s3.enabled
            Value: "true"
          - !Ref AWS::NoValue
        - !If
          - HasLogBucket
          - Key: access_logs.s3.bucket
            Value: !Ref LogBucketName
          - !Ref AWS::NoValue

  # HTTP listener: redirect to HTTPS wanneer er een certificaat is
  HTTPListenerRedirect:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # HTTP listener: direct forward wanneer geen certificaat beschikbaar is
  HTTPListenerForward:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasNoCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  # HTTPS listener: forward to target group (alleen met certificaat)
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

# Output
Outputs:
  LoadBalancerDNSName:
    Description: Public URL for CloudShirt
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}:LoadBalancerDNS"

  WebTargetGroup:
    Description: ARN of the Target Group
    Value: !Ref WebTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}:WebTargetGroup"
