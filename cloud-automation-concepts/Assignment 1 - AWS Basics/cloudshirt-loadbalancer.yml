AWSTemplateFormatVersion: 2010-09-09
Description: >
  CloudShirt ALB (REQ-01). Verdeelt verkeer over webservers in twee AZ's.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Target Group — verwijst naar de EC2-webserver-instances ─────────────
  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !ImportValue cloudshirt-network:VPC
      Protocol: HTTP
      Port: 80
      TargetType: instance
      # ALB accepteert codes 200-399. Zodra de app draait en de DB bereikbaar
      # is, retourneert de homepagina 200. HealthyThresholdCount=2 zorgt dat
      # de instance snel als healthy wordt gemarkeerd zodra de app klaar is.
      # UnhealthyThresholdCount=10 geeft de instance 5 minuten speling.
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 10
      Matcher:
        HttpCode: "200-399"
      Targets:
        - Id: !ImportValue cloudshirt-ec2:Instance1
        - Id: !ImportValue cloudshirt-ec2:Instance2

  # ── Application Load Balancer ────────────────────────────────────────────
  # Publiek toegankelijk, verdeeld over twee publieke subnets (twee AZ's).
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: cloudshirt-alb
      Subnets:
        - !ImportValue cloudshirt-network:CloudShirtFirstSubnet
        - !ImportValue cloudshirt-network:CloudShirtSecondSubnet
      SecurityGroups:
        - !ImportValue cloudshirt-network:InstanceSG
      Scheme: internet-facing
      Type: application
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"

  # ── HTTP-listener: direct doorsturen naar target group ───────────────────
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  LoadBalancerDNSName:
    Description: Publieke URL van CloudShirt (ALB DNS-naam)
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}:LoadBalancerDNS"

  WebTargetGroup:
    Description: ARN van de Target Group
    Value: !Ref WebTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}:WebTargetGroup"
