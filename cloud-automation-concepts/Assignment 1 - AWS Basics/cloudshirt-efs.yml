AWSTemplateFormatVersion: 2010-09-09
Description: >
  CloudShirt EFS (REQ-03). Gedeeld bestandssysteem voor logs,
  mount targets in beide AZ's.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Security Group voor NFS-verkeer (poort 2049) ─────────────────────────
  # Alleen bereikbaar vanuit de VPC; niet publiek toegankelijk.
  CloudShirtEFSSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: NFS-toegang tot CloudShirt EFS vanuit de VPC
      VpcId: !ImportValue cloudshirt-network:VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16
          Description: NFS-toegang vanuit de VPC
      Tags:
        - Key: Name
          Value: CloudShirtEFS-SG

  # ── EFS Bestandssysteem ───────────────────────────────────────────────────
  # Versleuteld, general purpose. Bestanden ouder dan 30 dagen worden
  # automatisch naar Infrequent Access verplaatst (kostenbesparend).
  CloudShirtEFS:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  # ── Mount Targets (één per subnet/AZ) ────────────────────────────────────
  # Beide mount targets zijn nodig zodat instances in AZ1 en AZ2 het
  # bestandssysteem kunnen koppelen met minimale latentie.
  CloudShirtEFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref CloudShirtEFS
      SubnetId: !ImportValue cloudshirt-network:CloudShirtFirstSubnet
      SecurityGroups:
        - !Ref CloudShirtEFSSG

  CloudShirtEFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref CloudShirtEFS
      SubnetId: !ImportValue cloudshirt-network:CloudShirtSecondSubnet
      SecurityGroups:
        - !Ref CloudShirtEFSSG

# ---------------------------------------------------------------------------
# Outputs — geexporteerd voor gebruik door EC2- en ASG-stacks
# ---------------------------------------------------------------------------
Outputs:

  EFSId:
    Description: ID van het CloudShirt EFS-bestandssysteem
    Value: !Ref CloudShirtEFS
    Export:
      Name: !Sub "${AWS::StackName}:EFSid"

  EFSSG:
    Description: Security group voor CloudShirt EFS
    Value: !Ref CloudShirtEFSSG
    Export:
      Name: !Sub "${AWS::StackName}:EFSSG"

  EFSDNS:
    Description: Regionale DNS-naam van het EFS-bestandssysteem
    Value: !Sub "${CloudShirtEFS}.efs.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}:EFSDNS"
