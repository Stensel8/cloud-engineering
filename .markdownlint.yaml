# Markdownlint configuration
# See https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# MD012 - No multiple blanks: disabled (trailing blank lines in <details> sections)
MD012: false

# MD013 - Line length: disabled (long lines are acceptable in documentation)
MD013: false

# MD033 - Inline HTML: disabled (used for <details>/<summary> collapsible sections)
MD033: false

# MD036 - No emphasis as heading: disabled (bold steps inside <details> sections)
MD036: false

# MD040 - Fenced code language: disabled (generic code blocks without a language)
MD040: false

# MD041 - First line should be top-level heading: disabled (badges appear before H1)
MD041: false
