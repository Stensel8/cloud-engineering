# Kwaliteitschecks die draaien op elke pull request naar main of development.
#
# Jobs:
#   pr-title      - Controleert of de PR-titel voldoet aan Conventional Commits
#                   (feat, fix, docs, chore, refactor, style, revert, ci).
#   markdown      - Lint alle Markdown-bestanden met markdownlint-cli2.
#   image-format  - Weigert PNG/JPG-afbeeldingen in Uitwerking-mappen en plaatst
#                   een PR-comment met conversieinstructies als ze worden gevonden.
name: PR Checks

on:
  pull_request:
    branches: [main, development]

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  pr-title:
    name: Semantic PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          wip: true
          types: |
            feat
            fix
            docs
            chore
            refactor
            style
            revert
            ci

  image-format:
    name: Do not use JPG or PNG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Zoek niet-AVIF afbeeldingen
        id: check
        run: |
          {
            echo "files<<EOF"
            find . -path '*Uitwerking*' \
              -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) | sort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          count=$(find . -path '*Uitwerking*' \
            -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Alle afbeeldingen zijn AVIF."
          fi

      - name: PR-comment plaatsen of bijwerken
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v8
        env:
          FILES: ${{ steps.check.outputs.files }}
          ACTOR: ${{ github.event.pull_request.user.login }}
        with:
          script: |
            const MARKER = '<!-- avif-check -->';
            const files = process.env.FILES.trim().split('\n').map(f => `- \`${f}\``).join('\n');
            const actor = process.env.ACTOR;
            const body = [
              MARKER,
              `Hey @${actor}, je hebt nog afbeeldingen die geen AVIF zijn!`,
              '',
              'De volgende bestanden in `Uitwerking/` moeten geconverteerd worden:',
              files,
              '',
              'Installeer `avifenc`:',
              '```bash',
              'sudo pacman -S libavif',
              '```',
              '',
              'Batch-converteer alle afbeeldingen (recursief):',
              '```bash',
              'find . -type f \\( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \\) | while read -r f; do',
              '  avifenc -q 80 -s 6 "$f" "${f%.*}.avif" && rm "$f"',
              'done',
              '```',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: Annoteer en faal
        if: steps.check.outputs.found == 'true'
        env:
          FILES: ${{ steps.check.outputs.files }}
        run: |
          while IFS= read -r f; do
            echo "::error file=$f::Converteer naar AVIF voor het mergen"
          done <<< "$FILES"
          exit 1

  update-checklist:
    name: Auto-update PR checklist
    runs-on: ubuntu-latest
    if: always()
    needs: [pr-title, image-format]
    steps:
      - uses: actions/github-script@v8
        env:
          RESULT_PR_TITLE:     ${{ needs.pr-title.result }}
          RESULT_IMAGE_FORMAT: ${{ needs.image-format.result }}
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            let body = pr.body || '';

            // ── Remove unchecked "Type wijziging" options ─────────────────────
            body = body.replace(/^- \[ \] `\w+` —[^\n]*\n?/gm, '');

            // ── Collapse leftover blank lines ─────────────────────────────────
            body = body.replace(/\n{3,}/g, '\n\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body,
            });

