# CI Week 1 - CloudFormation template lint en validatie.
#
# Stappen:
#   1. lint - Controleert de CloudFormation-templates op stijl- en veiligheidsfouten met cfn-lint.
#
# Geen secrets vereist voor lint.
name: CI Week 1

on:
  push:
    branches: [main]
    paths:
      - "cloud-automation-concepts/Week 1/**"
  pull_request:
    branches: [main]
    paths:
      - "cloud-automation-concepts/Week 1/**"
  workflow_dispatch:

jobs:
  lint:
    name: CloudFormation lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Installeer cfn-lint
        run: pip install cfn-lint

      - name: Lint CloudFormation templates
        run: cfn-lint "cloud-automation-concepts/Week 1/*.yaml"
